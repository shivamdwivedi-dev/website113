backend:
  name: git-gateway
  branch: main

media_folder: assets/images
public_folder: /assets/images

collections:
  - name: "settings"
    label: "Website Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "business_config"
        label: "Contact & Social Details"
        file: "public/config/business-config.json"
        fields:
          - label: "Business Information"
            name: "business"
            widget: "object"
            fields:
              - {label: "Studio Name", name: "name", widget: "string"}
              - {label: "Contact Email", name: "email", widget: "string"}
              - {label: "Phone Number", name: "phone", widget: "string"}
              - {label: "WhatsApp Number (No spaces/dashes)", name: "whatsapp", widget: "string"}
              - {label: "Physical Address", name: "address", widget: "string"}
              - {label: "Google Maps Latitude", name: "location_lat", widget: "string", required: false}
              - {label: "Google Maps Longitude", name: "location_lng", widget: "string", required: false}
          - label: "Social Media Links"
            name: "social"
            widget: "object"
            fields:
              - {label: "Instagram Link", name: "instagram", widget: "string"}
              - {label: "Facebook Link", name: "facebook", widget: "string"}
              - {label: "YouTube Link", name: "youtube", widget: "string"}
          - label: "Homepage Hero Slider"
            name: "hero_slides"
            widget: "list"
            summary: "{{fields.alt}}"
            fields:
              - {label: "Slide Image", name: "image", widget: "image"}
              - {label: "Image Description", name: "alt", widget: "string"}
          - label: "Portfolio Gallery Items"
            name: "portfolio_items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.category}})"
            fields:
              - {label: "Photo", name: "image", widget: "image"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Category", name: "category", widget: "select", options: [{"label": "Weddings", "value": "wedding"}, {"label": "Portraits", "value": "portraits"}, {"label": "Events", "value": "events"}, {"label": "Drone Photography", "value": "drone"}]}
              - {label: "Year", name: "year", widget: "string"}
